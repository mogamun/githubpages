<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON 포매터</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d0d1a;
    color: #e2e8f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 20px;
    gap: 12px;
  }
  @media (prefers-color-scheme: light) {
    body { background: #f0f4ff; color: #1e293b; }
    textarea { background: #fff; border-color: #e2e8f0; color: #1e293b; }
    .output { background: #fff; border-color: #e2e8f0; color: #1e293b; }
    .error { color: #ef4444; }
  }
  .toolbar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  button {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid rgba(129,140,248,0.3);
    background: rgba(129,140,248,0.15);
    color: #818cf8;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  button:hover { background: rgba(129,140,248,0.25); transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  .spacer { flex: 1; }
  .copy-btn { color: #34d399; border-color: rgba(52,211,153,0.3); background: rgba(52,211,153,0.1); }
  .copy-btn:hover { background: rgba(52,211,153,0.2); }
  textarea, .output {
    flex: 1;
    min-height: 120px;
    padding: 16px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: #e2e8f0;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.85rem;
    line-height: 1.6;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: #818cf8; }
  .output { overflow: auto; white-space: pre-wrap; word-break: break-all; }
  .error { color: #f472b6; }
  .label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #818cf8; opacity: 0.7; }
</style>
</head>
<body>
  <div class="toolbar">
    <button onclick="format()">포맷</button>
    <button onclick="minify()">압축</button>
    <button onclick="validate()">검증</button>
    <div class="spacer"></div>
    <button class="copy-btn" onclick="copyOutput()">복사</button>
    <button onclick="clearAll()">지우기</button>
  </div>
  <div class="label">INPUT</div>
  <textarea id="input" placeholder='{"key": "value"}' spellcheck="false"></textarea>
  <div class="label">OUTPUT</div>
  <div class="output" id="output">JSON 데이터를 입력하세요.</div>

<script>
const input = document.getElementById('input');
const output = document.getElementById('output');

function format() {
  try {
    const parsed = JSON.parse(input.value);
    output.textContent = JSON.stringify(parsed, null, 2);
    output.className = 'output';
  } catch (e) {
    output.textContent = 'Error: ' + e.message;
    output.className = 'output error';
  }
}

function minify() {
  try {
    const parsed = JSON.parse(input.value);
    output.textContent = JSON.stringify(parsed);
    output.className = 'output';
  } catch (e) {
    output.textContent = 'Error: ' + e.message;
    output.className = 'output error';
  }
}

function validate() {
  try {
    JSON.parse(input.value);
    output.textContent = 'Valid JSON';
    output.className = 'output';
  } catch (e) {
    output.textContent = 'Invalid: ' + e.message;
    output.className = 'output error';
  }
}

function copyOutput() {
  const text = output.textContent;
  if (!text || text === 'JSON 데이터를 입력하세요.') return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

function clearAll() {
  input.value = '';
  output.textContent = 'JSON 데이터를 입력하세요.';
  output.className = 'output';
}

input.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') format();
});
</script>
</body>
</html>
